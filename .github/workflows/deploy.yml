name: Deploy CLAWD OS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/claudeuser/clawd/paperclip
            git pull origin master
            export PATH="$PATH:/home/claudeuser/.local/share/pnpm"
            pnpm install --frozen-lockfile
            pnpm build
            PM2_HOME=/home/claudeuser/.pm2 pm2 restart clawd-os || PM2_HOME=/home/claudeuser/.pm2 pm2 start "node server/dist/index.js" --name clawd-os
            PM2_HOME=/home/claudeuser/.pm2 pm2 save
            echo "Deployed successfully"
